<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资产持仓监控面板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;font-family:system-ui, sans-serif;}
body{max-width:1100px;margin:30px auto;padding:0 16px;background:#0f1419;color:#e6e6e6;}
table{width:100%;border-collapse:collapse;margin:20px 0;}
th,td{padding:12px 10px;text-align:left;border-bottom:1px solid #2c3238;}
th{color:#aaa;font-weight:normal;}
.positive{color:#52c41a;}
.negative{color:#ff4d4f;}
.warn{color:#faad14;}
.tag-ext{font-size:12px;margin-left:6px;color:#999;}
.total-box{background:#1a2028;padding:18px;border-radius:8px;margin:20px 0;}
.chart-box{background:#1a2028;padding:18px;border-radius:8px;margin:20px 0;}
.chart-box h3{margin-top:0;}
.chart-summary{display:flex;gap:30px;margin-bottom:14px;color:#aaa;font-size:14px;}
.chart-summary b{color:#e6e6e6;font-weight:normal;font-size:16px;margin-left:6px;}
.info{color:#999;font-size:14px}
.cny-line{margin-top:8px;padding-top:8px;border-top:1px solid #2c3238;}
</style>
</head>
<body>
<h2>持仓资产监控面板</h2>
<div class="info">
下次自动刷新：<span id="countdown">5:00</span> | 最近更新：<span id="lastUpdate">-</span>
<div class="warn" id="warnTip"></div>
</div>

<table>
<thead>
<tr>
<th>市场</th>
<th>品种</th>
<th>持仓数量</th>
<th>成本价(USD)</th>
<th>投入总成本(USD)</th>
<th>当前市价(USD)</th>
<th>当前市值(USD)</th>
<th>盈亏(USD)</th>
<th>盈亏比例</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="total-box">
<h3>汇总统计</h3>
<p>总投入成本：<span id="totalCost"></span> USD</p>
<p>当前总市值：<span id="totalValue"></span> USD</p>
<p>总盈亏：<span id="totalPnl"></span> USD（<span id="totalPnlPct"></span>）</p>
<div class="cny-line">
<p>折合人民币总市值：<span id="totalValueCNY"></span> CNY（汇率：<span id="usdtCnyRate">-</span>）</p>
<p>折合人民币总盈亏：<span id="totalPnlCNY"></span> CNY</p>
</div>
</div>

<div class="chart-box">
<h3>资产净值走势（按日）</h3>
<div class="chart-summary">
  <div>起始日（2026-07-01）净值：<b id="startValue">-</b> USD</div>
  <div>累计净值变动：<b id="rangeChange">-</b></div>
  <div>数据天数：<b id="dataDays">-</b> 天</div>
</div>
<canvas id="assetChart" height="120"></canvas>
</div>

<script>
// ========== 持仓数据 ==========
const holdings = [
  {market:"美股",symbol:"CRCL",qty:581,costPrice:70.6299,costTotal:41036,coingeckoId:"",yahooTicker:"CRCL"},
  {market:"虚拟货币",symbol:"BTC",qty:0.30939,costPrice:63867.61,costTotal:19760,coingeckoId:"bitcoin",yahooTicker:""},
  {market:"虚拟货币",symbol:"PENDLE",qty:2038.65,costPrice:1.53,costTotal:3120,coingeckoId:"pendle",yahooTicker:""},
  {market:"虚拟货币",symbol:"AAVE",qty:37.46,costPrice:93.43,costTotal:3500,coingeckoId:"aave",yahooTicker:""},
  {market:"虚拟货币",symbol:"UNI",qty:1114.53,costPrice:3.5262,costTotal:3930,coingeckoId:"uniswap",yahooTicker:""}
];

const REFRESH_MS = 5 * 60 * 1000;
let countdownSec = REFRESH_MS / 1000;
const warnTip = document.getElementById("warnTip");
// 双代理轮询
const proxyList = [
  "https://corsproxy.io/?",
  "https://cors-anywhere.azm.workers.dev/"
];
// 从本地存储读取历史行情，刷新页面不丢失
let priceCache = JSON.parse(localStorage.getItem("assetPriceCache")) || {};
// 历史净值数据（按天）
let assetHistory = JSON.parse(localStorage.getItem("assetHistory")) || [];
// USDT兑人民币汇率（OTC参考价）
let usdtCnyRate = parseFloat(localStorage.getItem("usdtCnyRate")) || 7.25;
let chartInstance = null;

function fetchWithTimeout(url, timeout = 8000) {
  return Promise.race([
    fetch(url),
    new Promise((_, reject) => setTimeout(() => reject(new Error("请求超时")), timeout))
  ]);
}

// 代理统一封装
async function proxyFetch(targetUrl){
  for(const p of proxyList){
    try{
      const url = p + encodeURIComponent(targetUrl);
      const res = await fetchWithTimeout(url);
      if(res.ok) return res;
    }catch(e){continue;}
  }
  throw new Error("全部代理请求失败");
}

// 获取今日日期字符串 YYYY-MM-DD
function getTodayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// 更新每日净值记录（同一天只保留最新一条）
function updateDailyHistory(totalValueUsd){
  const today = getTodayStr();
  const existIdx = assetHistory.findIndex(item => item.date === today);
  if(existIdx >= 0){
    assetHistory[existIdx].value = totalValueUsd;
  }else{
    assetHistory.push({date: today, value: totalValueUsd});
  }
  // 按日期排序
  assetHistory.sort((a,b) => a.date.localeCompare(b.date));
  localStorage.setItem("assetHistory", JSON.stringify(assetHistory));
}

// 渲染折线图
function renderChart(){
  const ctx = document.getElementById("assetChart").getContext("2d");
  const labels = assetHistory.map(i => i.date.slice(5));
  const data = assetHistory.map(i => i.value);

  // 统计数据
  if(assetHistory.length > 0){
    const startVal = assetHistory[0].value;
    const latestVal = assetHistory[assetHistory.length-1].value;
    const diff = latestVal - startVal;
    const diffPct = (diff / startVal * 100).toFixed(2);
    const cls = diff >= 0 ? "positive" : "negative";
    document.getElementById("startValue").innerText = startVal.toFixed(2);
    document.getElementById("rangeChange").innerHTML = `<span class="${cls}">${diff>=0?"+":""}${diff.toFixed(2)} USD (${diff>=0?"+":""}${diffPct}%)</span>`;
    document.getElementById("dataDays").innerText = assetHistory.length;
  }

  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "总资产净值 (USD)",
        data: data,
        borderColor: "#52c41a",
        backgroundColor: "rgba(82, 196, 26, 0.1)",
        fill: true,
        tension: 0.3,
        pointRadius: 3,
        pointBackgroundColor: "#52c41a",
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {labels:{color:"#aaa"}},
        tooltip: {
          callbacks: {
            label: function(ctx){
              return "净值: " + ctx.parsed.y.toFixed(2) + " USD";
            }
          }
        }
      },
      scales: {
        x: {ticks:{color:"#888"}, grid:{color:"#2c3238"}},
        y: {ticks:{color:"#888"}, grid:{color:"#2c3238"}}
      }
    }
  });
}

function render(prices){
  let html = "";
  let sumCost = 0, sumValue = 0;
  holdings.forEach(item=>{
    sumCost += item.costTotal;
    const raw = prices[item.symbol];
    let price, tag = "";

    if(typeof raw === "number"){
      price = raw;
    }else if(raw && raw.price){
      price = raw.price;
      tag = raw.tag || "";
    }else{
      html += `
      <tr>
        <td>${item.market}</td>
        <td>${item.symbol}</td>
        <td>${item.qty}</td>
        <td>${item.costPrice.toFixed(2)}</td>
        <td>${item.costTotal.toFixed(2)}</td>
        <td class="warn">暂无最新，沿用缓存</td>
        <td>-</td><td>-</td><td>-</td>
      </tr>
      `;
      return;
    }

    const marketValue = item.qty * price;
    const pnl = marketValue - item.costTotal;
    const pnlPct = (pnl / item.costTotal *100).toFixed(2);
    const cls = pnl >=0 ? "positive" : "negative";

    html += `
    <tr>
      <td>${item.market}</td>
      <td>${item.symbol}</td>
      <td>${item.qty}</td>
      <td>${item.costPrice.toFixed(2)}</td>
      <td>${item.costTotal.toFixed(2)}</td>
      <td>${price.toFixed(2)} ${tag?`<span class="tag-ext">${tag}</span>`:""}</td>
      <td>${marketValue.toFixed(2)}</td>
      <td class="${cls}">${pnl.toFixed(2)}</td>
      <td class="${cls}">${pnlPct}%</td>
    </tr>
    `;
    sumValue += marketValue;
  })
  document.getElementById("tableBody").innerHTML = html;

  const totalPnl = sumValue - sumCost;
  const totalPnlPct = (totalPnl / sumCost *100).toFixed(2);
  const clsTotal = totalPnl >=0 ? "positive" : "negative";

  document.getElementById("totalCost").innerText = sumCost.toFixed(2);
  document.getElementById("totalValue").innerText = sumValue.toFixed(2);
  document.getElementById("totalPnl").innerHTML = `<span class="${clsTotal}">${totalPnl.toFixed(2)}</span>`;
  document.getElementById("totalPnlPct").innerHTML = `<span class="${clsTotal}">${totalPnlPct}%</span>`;

  // 人民币折算
  document.getElementById("usdtCnyRate").innerText = usdtCnyRate.toFixed(4);
  const totalValueCNY = sumValue * usdtCnyRate;
  const totalPnlCNY = totalPnl * usdtCnyRate;
  document.getElementById("totalValueCNY").innerText = totalValueCNY.toFixed(2);
  document.getElementById("totalPnlCNY").innerHTML = `<span class="${clsTotal}">${totalPnlCNY.toFixed(2)}</span>`;

  document.getElementById("lastUpdate").innerText = new Date().toLocaleString();

  // 更新每日净值并刷新图表
  if(sumValue > 0){
    updateDailyHistory(sumValue);
    renderChart();
  }
}

// ========== 虚拟货币【完全不变】 ==========
async function fetchCryptoPrices(){
  const ids = holdings.filter(h=>h.coingeckoId).map(h=>h.coingeckoId).join(",");
  const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`;
  const res = await fetch(url);
  const json = await res.json();
  const map = {};
  map["BTC"] = json.bitcoin.usd;
  map["PENDLE"] = json.pendle.usd;
  map["AAVE"] = json.aave.usd;
  map["UNI"] = json.uniswap.usd;
  return map;
}

// ========== 获取USDT/CNY汇率（OTC参考价） ==========
async function fetchUsdtCnyRate(){
  try{
    const url = "https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=cny";
    const res = await fetch(url);
    const json = await res.json();
    if(json.tether && json.tether.cny){
      usdtCnyRate = json.tether.cny;
      localStorage.setItem("usdtCnyRate", usdtCnyRate);
    }
  }catch(e){
    console.log("汇率获取失败，使用缓存汇率", e);
  }
}

// ========== Yahoo CRCL 盘前/盘后逻辑 + 多代理重试 ==========
async function fetchStockPrice(){
  const ticker = "CRCL";
  const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`;
  for(const proxy of proxyList){
    try{
      const url = proxy + encodeURIComponent(targetUrl);
      const res = await fetchWithTimeout(url);
      const j = await res.json();
      const meta = j.chart.result[0].meta;
      let usePrice = meta.regularMarketPrice;
      let tag = "";
      const nowUtcSec = Date.now() / 1000;
      const regCloseTime = meta.regularMarketTime;

      if (nowUtcSec < regCloseTime && meta.preMarketPrice) {
        usePrice = meta.preMarketPrice;
        tag = "[盘前]";
      } else if (nowUtcSec > regCloseTime && meta.postMarketPrice) {
        usePrice = meta.postMarketPrice;
        tag = "[盘后]";
      }
      return {"CRCL": {price:usePrice, tag:tag}};
    }catch(err){
      continue;
    }
  }
  return null;
}

async function loadQuotes(){
  warnTip.innerText = "";
  const newPriceMap = {...priceCache};

  // 汇率（并行请求，不阻塞主行情）
  fetchUsdtCnyRate();

  try{
    const cryptoMap = await fetchCryptoPrices();
    Object.assign(newPriceMap, cryptoMap);
  }catch(e){
    warnTip.innerText += "⚠️ 加密货币行情获取失败 ";
  }

  try{
    const stockMap = await fetchStockPrice();
    if(stockMap){
      Object.assign(newPriceMap, stockMap);
    }else{
      warnTip.innerText += "⚠️ CRCL代理全部失效，沿用缓存价格";
    }
  }catch(e){
    warnTip.innerText += "⚠️ CRCL请求异常，沿用缓存价格";
  }

  // 更新缓存并持久化到浏览器本地
  priceCache = {...newPriceMap};
  localStorage.setItem("assetPriceCache", JSON.stringify(priceCache));
  render(priceCache);
  countdownSec = REFRESH_MS / 1000;
}

function tickCountdown(){
  countdownSec--;
  const m = Math.floor(countdownSec /60);
  const s = countdownSec %60;
  document.getElementById("countdown").innerText = `${m}:${s.toString().padStart(2,"0")}`;
  if(countdownSec <=0){
    loadQuotes();
  }
}

loadQuotes();
setInterval(tickCountdown, 1000);
setInterval(loadQuotes, REFRESH_MS);
</script>
</body>
</html>
