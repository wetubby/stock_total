<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资产持仓监控面板</title>
<style>
*{box-sizing:border-box;font-family:system-ui, sans-serif;}
body{max-width:1100px;margin:30px auto;padding:0 16px;background:#0f1419;color:#e6e6e6;}
table{width:100%;border-collapse:collapse;margin:20px 0;}
th,td{padding:12px 10px;text-align:left;border-bottom:1px solid #2c3238;}
th{color:#aaa;font-weight:normal;}
.positive{color:#52c41a;}
.negative{color:#ff4d4f;}
.warn{color:#faad14;}
.total-box{background:#1a2028;padding:18px;border-radius:8px;margin:20px 0;}
.info{color:#999;font-size:14px}
</style>
</head>
<body>
<h2>持仓资产监控面板</h2>
<div class="info">
下次自动刷新：<span id="countdown">5:00</span> | 最近更新：<span id="lastUpdate">-</span>
<div class="warn" id="warnTip"></div>
</div>

<table>
<thead>
<tr>
<th>市场</th>
<th>品种</th>
<th>持仓数量</th>
<th>成本价(USD)</th>
<th>投入总成本(USD)</th>
<th>当前市价(USD)</th>
<th>当前市值(USD)</th>
<th>盈亏(USD)</th>
<th>盈亏比例</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="total-box">
<h3>汇总统计</h3>
<p>总投入成本：<span id="totalCost"></span> USD</p>
<p>当前总市值：<span id="totalValue"></span> USD</p>
<p>总盈亏：<span id="totalPnl"></span> USD（<span id="totalPnlPct"></span>）</p>
</div>

<script>
// 持仓数据
const holdings = [
  {market:"美股",symbol:"CRCL",qty:581,costPrice:70.6299,costTotal:41036,binanceSymbol:"",yahooTicker:"CRCL"},
  {market:"虚拟货币",symbol:"BTC",qty:0.30939,costPrice:63867.61,costTotal:19760,binanceSymbol:"BTCUSDT",yahooTicker:""},
  {market:"虚拟货币",symbol:"PENDLE",qty:2038.65,costPrice:1.53,costTotal:3120,binanceSymbol:"PENDLEUSDT",yahooTicker:""},
  {market:"虚拟货币",symbol:"AAVE",qty:37.46,costPrice:93.43,costTotal:3500,binanceSymbol:"AAVEUSDT",yahooTicker:""},
  {market:"虚拟货币",symbol:"UNI",qty:1114.53,costPrice:3.5262,costTotal:3930,binanceSymbol:"UNIUSDT",yahooTicker:""}
];

const REFRESH_MS = 5 * 60 * 1000;
let countdownSec = REFRESH_MS / 1000;
const warnTip = document.getElementById("warnTip");
const CORS_PROXY = "https://corsproxy.io/?";

// 渲染表格
function render(prices){
  let html = "";
  let sumCost = 0, sumValue = 0;
  holdings.forEach(item=>{
    sumCost += item.costTotal;
    const price = prices[item.symbol];
    if(!price){
      html += `
      <tr>
        <td>${item.market}</td>
        <td>${item.symbol}</td>
        <td>${item.qty}</td>
        <td>${item.costPrice.toFixed(2)}</td>
        <td>${item.costTotal.toFixed(2)}</td>
        <td class="warn">获取失败</td>
        <td>-</td><td>-</td><td>-</td>
      </tr>
      `;
      return;
    }
    const marketValue = item.qty * price;
    const pnl = marketValue - item.costTotal;
    const pnlPct = (pnl / item.costTotal *100).toFixed(2);
    const cls = pnl >=0 ? "positive" : "negative";

    html += `
    <tr>
      <td>${item.market}</td>
      <td>${item.symbol}</td>
      <td>${item.qty}</td>
      <td>${item.costPrice.toFixed(2)}</td>
      <td>${item.costTotal.toFixed(2)}</td>
      <td>${price.toFixed(2)}</td>
      <td>${marketValue.toFixed(2)}</td>
      <td class="${cls}">${pnl.toFixed(2)}</td>
      <td class="${cls}">${pnlPct}%</td>
    </tr>
    `;
    sumValue += marketValue;
  })
  document.getElementById("tableBody").innerHTML = html;

  const totalPnl = sumValue - sumCost;
  const totalPnlPct = (totalPnl / sumCost *100).toFixed(2);
  const clsTotal = totalPnl >=0 ? "positive" : "negative";

  document.getElementById("totalCost").innerText = sumCost.toFixed(2);
  document.getElementById("totalValue").innerText = sumValue.toFixed(2);
  document.getElementById("totalPnl").innerHTML = `<span class="${clsTotal}">${totalPnl.toFixed(2)}</span>`;
  document.getElementById("totalPnlPct").innerHTML = `<span class="${clsTotal}">${totalPnlPct}%</span>`;
  document.getElementById("lastUpdate").innerText = new Date().toLocaleString();
}

// 币安批量获取币价（无需代理）
async function fetchCryptoPrices(){
  const symbolList = holdings.filter(h=>h.binanceSymbol).map(x=>x.binanceSymbol).join(",");
  const url = `https://api.binance.com/api/v3/ticker/price?symbols=["${symbolList}"]`;
  const res = await fetch(url);
  const data = await res.json();
  const map = {};
  data.forEach(item=>{
    if(item.symbol === "BTCUSDT") map["BTC"] = parseFloat(item.price);
    if(item.symbol === "PENDLEUSDT") map["PENDLE"] = parseFloat(item.price);
    if(item.symbol === "AAVEUSDT") map["AAVE"] = parseFloat(item.price);
    if(item.symbol === "UNIUSDT") map["UNI"] = parseFloat(item.price);
  });
  return map;
}

// 美股CRCL（保持原有代理不变，当前可用）
async function fetchStockPrice(){
  const ticker = "CRCL";
  const target = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`;
  const url = CORS_PROXY + encodeURIComponent(target);
  const res = await fetch(url);
  const j = await res.json();
  const price = j.chart.result[0].meta.regularMarketPrice;
  return {"CRCL":price};
}

async function loadQuotes(){
  warnTip.innerText = "";
  const priceMap = {};
  // 加密货币（币安直连，不走代理）
  try{
    const cryptoMap = await fetchCryptoPrices();
    Object.assign(priceMap, cryptoMap);
  }catch(e){
    warnTip.innerText += "⚠️ 加密货币行情获取失败 ";
    console.error("币安接口异常",e);
  }
  // 美股
  try{
    const stockMap = await fetchStockPrice();
    Object.assign(priceMap, stockMap);
  }catch(e){
    warnTip.innerText += "⚠️ CRCL美股行情获取失败 ";
    console.error("美股接口异常",e);
  }
  render(priceMap);
  countdownSec = REFRESH_MS / 1000;
}

function tickCountdown(){
  countdownSec--;
  const m = Math.floor(countdownSec /60);
  const s = countdownSec %60;
  document.getElementById("countdown").innerText = `${m}:${s.toString().padStart(2,"0")}`;
  if(countdownSec <=0){
    loadQuotes();
  }
}

loadQuotes();
setInterval(tickCountdown, 1000);
setInterval(loadQuotes, REFRESH_MS);
</script>
</body>
</html>
